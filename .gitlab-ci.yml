workflow:
  rules:
    - if: $CI_COMMIT_REF_NAME == 'main' && $CI_COMMIT_MESSAGE =~ /See merge request/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - when: never

variables:
  FF_TIMESTAMPS: true
  DOCKER_HOST: tcp://docker:2375
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  PLATFORMS: "linux/amd64,linux/arm64"

stages:
  - build

default:
  image: docker:29.6.1
  services:
    - name: docker:29.6.1-dind
      command: ["--tls=false"]
      variables:
        DOCKER_OPTS: "--insecure-registry=$DOCKERREGISTRY"

before_script:
  - apk add -q git jq
  # Register QEMU emulators so buildx can build non-native architectures on this runner
  - docker run --rm --privileged tonistiigi/binfmt --install all
  - docker buildx create --name packerci --driver docker-container --use
  - docker buildx inspect --bootstrap

build:
  stage: build
  script:
    - export LATEST=$(jq -r '.latest' VERSION)
    - export VERSION=$(jq -r '.version' VERSION)
    - export BUILDDATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
    - jq -r '.plugins[] | "LABEL io.mpoore.packer-ci.plugin.\(.name)=\"\(.version)\""' PLUGINS >> Dockerfile
    - echo "Building packer-ci image version $VERSION for platforms $PLATFORMS"
    - BUILD_ARGS="--build-arg VERSION=$VERSION --build-arg BUILDDATE=$BUILDDATE --build-arg LOCALREGISTRY=$LOCALREGISTRY"
    - |
      if [ "$CI_COMMIT_REF_NAME" == "main" ]; then
        echo "$DOCKERPASS" | docker login "$DOCKERREGISTRY" --username "$DOCKERUSER" --password-stdin
        TAGS="-t $DOCKERTARGET:$VERSION"
        if [ "$LATEST" == "true" ]; then
          TAGS="$TAGS -t $DOCKERTARGET:latest"
        fi
        docker buildx build . --platform="$PLATFORMS" $BUILD_ARGS $TAGS --push
      else
        docker buildx build . --platform="$PLATFORMS" $BUILD_ARGS -t packer-ci:$VERSION
      fi
  artifacts:
    paths:
      - Dockerfile
      - PLUGINS
      - VERSION